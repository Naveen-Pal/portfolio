<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" fill="#0f0f1a"/>

  <!-- Left bracket < -->
  <text x="7" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="38" fill="#6366f1">&lt;</text>

  <!-- NP letters -->
  <text x="27" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-weight="800" font-size="36" fill="#ffffff">NP</text>

  <!-- Right bracket > -->
  <text x="77" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="38" fill="#6366f1">&gt;</text>

  <!-- Terminal cursor underscore -->
  <rect x="46" y="68" width="18" height="3.5" rx="1.5" fill="#6366f1"/>
</svg>